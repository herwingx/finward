server {
    listen       80;
    server_name  localhost;

    charset utf-8;
    root /usr/share/nginx/html;
    index index.html;

    # Handle SPA routing (always fallback to index.html if file not found)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets caching strategy
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|eot|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Don't log missing favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Don't log missing robots.txt
    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }
}
